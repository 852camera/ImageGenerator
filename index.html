<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Watermark Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: sans-serif; background-color: #111827; color: white; }
        .canvas-container {
            background: #1f2937;
            background-image: linear-gradient(45deg, #374151 25%, transparent 25%), 
                              linear-gradient(-45deg, #374151 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #374151 75%), 
                              linear-gradient(-45deg, transparent 75%, #374151 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const App = () => {
            // Media states
            const [imageObj, setImageObj] = useState(null);
            const [mediaType, setMediaType] = useState('image'); // 'image' or 'video'
            const [logoObj, setLogoObj] = useState(null);
            const [seatingPlanObj, setSeatingPlanObj] = useState(null);
            const [seatingPlanSrc, setSeatingPlanSrc] = useState(null);
            const [imageSrc, setImageSrc] = useState(null);
            
            // Interaction & Export states
            const [pinPosition, setPinPosition] = useState(null);
            const [mainImagePin, setMainImagePin] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [recordingProgress, setRecordingProgress] = useState(0);
            
            // UI states
            const [outputSize, setOutputSize] = useState('ig');
            const [fontFamily, setFontFamily] = useState("'Noto Sans TC', sans-serif");
            const [fontScale, setFontScale] = useState(1);
            const [logoPosition, setLogoPosition] = useState('top-right');
            const [enableZoom, setEnableZoom] = useState(false);
            const [zoomLevel, setZoomLevel] = useState(2); 
            const [zoomPosition, setZoomPosition] = useState('top-left');
            const [zoomSize, setZoomSize] = useState(0.25); 

            // Text content states
            const [camera, setCamera] = useState('Canon R7');
            const [lens, setLens] = useState('RF100500');
            const [venue, setVenue] = useState('Kai Tak Arena');
            const [seating, setSeating] = useState('Block A Row C');
            const [optionalText, setOptionalText] = useState('');

            const canvasRef = useRef(null);
            const animationRef = useRef(null);

            // Load hardcoded logo on initial render
            useEffect(() => {
                const img = new Image();
                img.onload = () => setLogoObj(img);
                img.src = 'logo.jpg'; 
            }, []);

            // Handle main media upload
            const handleMediaUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const isVid = file.type.startsWith('video/');
                    setMediaType(isVid ? 'video' : 'image');
                    const url = URL.createObjectURL(file);
                    setImageSrc(url);

                    if (isVid) {
                        const vid = document.createElement('video');
                        vid.src = url;
                        vid.muted = true; // Auto-play policies require muted
                        vid.loop = true;
                        vid.playsInline = true;
                        vid.crossOrigin = "anonymous";
                        
                        vid.style.display = 'none';
                        document.body.appendChild(vid);
                        
                        vid.onloadeddata = () => {
                            setImageObj(vid);
                            vid.play();
                        };
                    } else {
                        const img = new Image();
                        img.onload = () => setImageObj(img);
                        img.src = url;
                    }
                }
            };

            const handleSeatingPlanUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setSeatingPlanSrc(event.target.result);
                        const img = new Image();
                        img.onload = () => setSeatingPlanObj(img);
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSeatingPlanClick = (e) => {
                const rect = e.target.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                setPinPosition({ x, y });
            };

            const handleMainImageClick = (e) => {
                const rect = e.target.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                setMainImagePin({ x, y });
            };

            const clearSeatingPlan = () => {
                setSeatingPlanObj(null);
                setSeatingPlanSrc(null);
                setPinPosition(null);
            };

            // Master render function
            const renderCanvas = useCallback(() => {
                if (!imageObj || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // Unify dimensions between Image and Video elements
                const mWidth = imageObj.videoWidth || imageObj.width;
                const mHeight = imageObj.videoHeight || imageObj.height;
                
                if (!mWidth || !mHeight) return; // Prevent rendering before video metadata loads

                let w, h;
                let imgX = 0, imgY = 0, imgW, imgH;

                // 1. Determine Canvas Size
                if (outputSize === 'ig') {
                    const targetRatio = 4 / 5;
                    const imgRatio = mWidth / mHeight;
                    
                    let cw, ch;
                    if (imgRatio > targetRatio) {
                        cw = mWidth;
                        ch = cw / targetRatio;
                    } else {
                        ch = mHeight;
                        cw = ch * targetRatio;
                    }

                    const newW = Math.max(1080, Math.round(cw));
                    const newH = Math.max(1350, Math.round(ch));
                    
                    // Only assign if different to prevent buffer wiping
                    if (canvas.width !== newW) canvas.width = newW;
                    if (canvas.height !== newH) canvas.height = newH;
                    
                    w = canvas.width;
                    h = canvas.height;
                } else {
                    // Only assign if different
                    if (canvas.width !== mWidth) canvas.width = mWidth;
                    if (canvas.height !== mHeight) canvas.height = mHeight;
                    
                    w = canvas.width;
                    h = canvas.height;
                }

                imgW = w;
                imgH = h;
                ctx.clearRect(0, 0, w, h);

                // 2. Draw Media
                if (outputSize === 'ig') {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, w, h);

                    const scaleFit = Math.min(w / mWidth, h / mHeight);
                    imgW = mWidth * scaleFit;
                    imgH = mHeight * scaleFit;
                    imgX = (w - imgW) / 2;
                    imgY = (h - imgH) / 2;
                    
                    ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.15)';
                    ctx.shadowBlur = isRecording ? 0 : w * 0.025;
                    ctx.drawImage(imageObj, imgX, imgY, imgW, imgH);
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                } else {
                    ctx.drawImage(imageObj, 0, 0, w, h);
                }

                // 3. Text Scaling & Dimensions
                const textMarginX = imgW * 0.025; 
                const primaryFontSize = imgW * 0.036 * fontScale;
                const secondaryFontSize = imgW * 0.028 * fontScale;
                const lineSpacing = imgW * 0.01 * fontScale;
                const totalTextHeight = primaryFontSize + secondaryFontSize + (optionalText ? secondaryFontSize + lineSpacing : 0) + lineSpacing;
                const paddingY = imgW * 0.02 * fontScale;
                
                const barHeight = totalTextHeight + paddingY * 2;
                const barY = imgY + imgH - barHeight;

                // 4. Draw Overlay Bar
                const barGrad = ctx.createLinearGradient(imgX, barY, imgX + imgW, barY);
                barGrad.addColorStop(0, '#0F305D'); 
                barGrad.addColorStop(0.6, 'rgba(15, 48, 93, 0.9)'); 
                barGrad.addColorStop(0.75, 'rgba(15, 48, 93, 0.6)');
                barGrad.addColorStop(0.95, 'rgba(15, 48, 93, 0)');   
                
                ctx.fillStyle = barGrad;
                ctx.fillRect(imgX, barY, imgW, barHeight);

                // 5. Text Elements
                ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = isRecording ? 0 : imgW * 0.005;
                ctx.shadowOffsetX = isRecording ? 0 : imgW * 0.001;
                ctx.shadowOffsetY = isRecording ? 0 : imgW * 0.001;

                ctx.textAlign = 'left';
                let currentY = barY + paddingY + primaryFontSize * 0.85; 
                
                ctx.font = `900 ${primaryFontSize}px ${fontFamily}`;
                ctx.fillStyle = 'white';

                let equipmentText = '拍攝器材 : ';
                if (camera && lens) {
                    equipmentText += `${camera} + ${lens}`;
                } else if (camera || lens) {
                    equipmentText += camera || lens;
                }
                ctx.fillText(equipmentText, imgX + textMarginX, currentY);

                currentY += secondaryFontSize + lineSpacing;
                ctx.font = `400 ${secondaryFontSize}px ${fontFamily}`; 
                const locationDisplay = [venue, seating].filter(Boolean).join(' | ');
                ctx.fillText(locationDisplay, imgX + textMarginX, currentY);

                if (optionalText) {
                    currentY += secondaryFontSize + lineSpacing;
                    ctx.fillText(optionalText, imgX + textMarginX, currentY);
                }

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                // 6. Draw Logo
                if (logoObj) {
                    const logoMaxW = imgW * 0.25; 
                    const logoMaxH = imgW * 0.08; 
                    
                    let logoW = logoObj.width;
                    let logoH = logoObj.height;
                    
                    const scale = Math.min(logoMaxW / logoW, logoMaxH / logoH);
                    logoW = logoW * scale;
                    logoH = logoH * scale;

                    const logoX = logoPosition === 'top-left' ? imgX + textMarginX : imgX + imgW - logoW - textMarginX;
                    const logoY = imgY + imgW * 0.03; 

                    ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = isRecording ? 0 : imgW * 0.01;
                    ctx.drawImage(logoObj, logoX, logoY, logoW, logoH);
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                // 7. Draw Seating Plan
                if (seatingPlanObj) {
                    const spMaxW = imgW * 0.25; 
                    const spMaxH = imgH * 0.20; 
                    
                    let spW = seatingPlanObj.width;
                    let spH = seatingPlanObj.height;
                    
                    const spScale = Math.min(spMaxW / spW, spMaxH / spH);
                    spW = spW * spScale;
                    spH = spH * spScale;

                    const spX = imgX + imgW - spW - textMarginX;
                    const spY = imgY + imgH - spH - paddingY; 

                    ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = isRecording ? 0 : imgW * 0.008;
                    ctx.lineWidth = imgW * 0.002;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; 
                    ctx.drawImage(seatingPlanObj, spX, spY, spW, spH);
                    ctx.strokeRect(spX, spY, spW, spH);
                    
                    if (pinPosition) {
                        const pinX = spX + (pinPosition.x * spW);
                        const pinY = spY + (pinPosition.y * spH);
                        
                        ctx.save();
                        ctx.translate(pinX, pinY);
                        ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.6)';
                        ctx.shadowBlur = isRecording ? 0 : imgW * 0.005;
                        ctx.shadowOffsetY = isRecording ? 0 : imgW * 0.002;
                        
                        const pinScale = imgW * 0.0018; 
                        ctx.scale(pinScale, pinScale);
                        ctx.translate(-12, -22); 
                        
                        const pinPath = new Path2D("M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z");
                        ctx.lineWidth = 1.5 / pinScale; 
                        ctx.strokeStyle = '#ffffff';
                        ctx.stroke(pinPath);
                        ctx.fillStyle = '#ef4444'; 
                        ctx.fill(pinPath);
                        ctx.restore();
                    }
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                // 8. Draw Sharpness Zoom
                if (enableZoom && mainImagePin) {
                    const insetSize = imgW * zoomSize; 
                    const baseCropReference = imgW * 0.25; 
                    
                    const px = mainImagePin.x * mWidth;
                    const py = mainImagePin.y * mHeight;
                    
                    const sWidth = baseCropReference / zoomLevel;
                    const sHeight = baseCropReference / zoomLevel; 
                    
                    let sx = px - (sWidth / 2);
                    let sy = py - (sHeight / 2);
                    
                    if (sx < 0) sx = 0;
                    if (sy < 0) sy = 0;
                    if (sx + sWidth > mWidth) sx = mWidth - sWidth;
                    if (sy + sHeight > mHeight) sy = mHeight - sHeight;

                    let dx, dy;
                    const padding = imgW * 0.03;
                    
                    switch (zoomPosition) {
                        case 'top-left': dx = imgX + padding; dy = imgY + padding; break;
                        case 'top-right': dx = imgX + imgW - insetSize - padding; dy = imgY + padding; break;
                        case 'bottom-left': dx = imgX + padding; dy = barY - insetSize - padding; break;
                        case 'bottom-right': dx = imgX + imgW - insetSize - padding; dy = barY - insetSize - padding; break;
                        default: dx = imgX + padding; dy = imgY + padding;
                    }

                    if (logoObj) {
                        const logoMaxH = imgW * 0.08;
                        if (zoomPosition === 'top-right' && logoPosition === 'top-right') dy += logoMaxH + padding;
                        else if (zoomPosition === 'top-left' && logoPosition === 'top-left') dy += logoMaxH + padding;
                    }
                    
                    if (seatingPlanObj && zoomPosition === 'bottom-right') {
                        const spMaxH = imgH * 0.20;
                        dy -= spMaxH + padding;
                    }

                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(dx + insetSize/2, dy + insetSize/2, insetSize/2, 0, Math.PI * 2);
                    
                    ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.6)';
                    ctx.shadowBlur = isRecording ? 0 : imgW * 0.015;
                    ctx.shadowOffsetY = isRecording ? 0 : imgW * 0.005;
                    ctx.fillStyle = 'white';
                    ctx.fill();
                    
                    ctx.clip();
                    ctx.drawImage(imageObj, sx, sy, sWidth, sHeight, dx, dy, insetSize, insetSize);
                    
                    ctx.shadowColor = 'transparent';
                    ctx.lineWidth = imgW * 0.006;
                    ctx.strokeStyle = 'white';
                    ctx.stroke();
                    ctx.restore();
                    
                    ctx.font = `800 ${imgW * 0.016}px ${fontFamily}`;
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = isRecording ? 'transparent' : 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = isRecording ? 0 : imgW * 0.005;
                    ctx.fillText(`${zoomLevel}x ZOOM`, dx + insetSize/2, dy + insetSize + imgW * 0.025);
                    ctx.shadowColor = 'transparent';
                }
            }, [imageObj, logoObj, seatingPlanObj, pinPosition, mainImagePin, enableZoom, zoomLevel, zoomSize, zoomPosition, camera, lens, venue, seating, optionalText, outputSize, fontFamily, fontScale, logoPosition, isRecording]);

            // Setup Render Loop
            useEffect(() => {
                if (!imageObj) return;
                
                let intervalId;

                if (mediaType === 'video') {
                    const loop = () => {
                        renderCanvas();
                        animationRef.current = requestAnimationFrame(loop);
                    };
                    animationRef.current = requestAnimationFrame(loop);
                    
                    // Anti-throttling fallback: Force 30fps updates if the tab goes to the background
                    intervalId = setInterval(() => {
                        if (document.hidden) {
                            renderCanvas();
                        }
                    }, 1000 / 60);

                    return () => {
                        cancelAnimationFrame(animationRef.current);
                        clearInterval(intervalId);
                    };
                } else {
                    renderCanvas();
                }
            }, [renderCanvas, mediaType, imageObj]);

            const downloadMedia = async () => {
                if (!canvasRef.current || !imageObj) return;

                if (mediaType === 'image') {
                    const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.95);
                    const link = document.createElement('a');
                    link.download = 'watermarked_photo.jpg';
                    link.href = dataUrl;
                    link.click();
                } else if (mediaType === 'video') {
                    const canvas = canvasRef.current;
                    if (!canvas.captureStream) {
                        alert("Your browser does not support local video export.");
                        return;
                    }

                    setIsRecording(true);
                    setRecordingProgress(0);

                    // 1. Prepare video for playback
                    imageObj.pause();
                    imageObj.loop = false;
                    imageObj.muted = false; // UNMUTE to force audio processing
                    imageObj.currentTime = 0;

                    // 2. Setup Web Audio API for SILENT EXTRACTION
                    // This intercepts the audio signal and prevents it from reaching the speakers
                    if (!imageObj._audioCtx) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        imageObj._audioCtx = new AudioContext();
                        imageObj._audioSource = imageObj._audioCtx.createMediaElementSource(imageObj);
                        imageObj._audioDest = imageObj._audioCtx.createMediaStreamDestination();
                        
                        // CRITICAL: We connect to the stream destination, NOT to imageObj._audioCtx.destination
                        // This guarantees the computer speakers stay silent!
                        imageObj._audioSource.connect(imageObj._audioDest);
                    }

                    if (imageObj._audioCtx.state === 'suspended') {
                        await imageObj._audioCtx.resume();
                    }

                    // 3. Explicitly Combine Video (Canvas) + Audio (Web Audio API Stream)
                    const canvasStream = canvas.captureStream(60);
                    const combinedTracks = [...canvasStream.getVideoTracks()];

                    const audioTracks = imageObj._audioDest.stream.getAudioTracks();
                    if (audioTracks.length > 0) {
                        combinedTracks.push(audioTracks[0]);
                    }

                    const finalStream = new MediaStream(combinedTracks);

                    // 4. Calculate Bitrate and Setup Recorder
                    const totalPixels = canvas.width * canvas.height;
                    const dynamicBitrate = Math.round((totalPixels / 2073600) * 12000000); 
                    const safeBitrate = Math.min(Math.max(dynamicBitrate, 8000000), 80000000);

                    let mimeType = 'video/webm';
                    let fileExt = 'webm';
                    
                    if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1.42E01E, mp4a.40.2"')) {
                        mimeType = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
                        fileExt = 'mp4';
                    } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                        mimeType = 'video/mp4';
                        fileExt = 'mp4';
                    } else if (MediaRecorder.isTypeSupported('video/webm; codecs="vp8, opus"')) {
                        mimeType = 'video/webm; codecs="vp8, opus"';
                    }

                    const recorderOptions = { 
                        videoBitsPerSecond: safeBitrate,
                        mimeType: mimeType
                    };

                    const recorder = new MediaRecorder(finalStream, recorderOptions); 
                    const chunks = [];

                    recorder.ondataavailable = e => {
                        if (e.data && e.data.size > 0) chunks.push(e.data);
                    };

                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: mimeType });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `watermarked_video.${fileExt}`;
                        a.click();
                        setIsRecording(false);
                        
                        // Restore silent looping preview state
                        imageObj.muted = true;
                        imageObj.loop = true; 
                        imageObj.play();
                    };

                    // Progress tracker
                    const duration = imageObj.duration;
                    const progressInterval = setInterval(() => {
                        if (imageObj.currentTime >= duration || imageObj.paused) {
                            clearInterval(progressInterval);
                        } else {
                            setRecordingProgress(Math.round((imageObj.currentTime / duration) * 100));
                        }
                    }, 100);

                    imageObj.onended = () => {
                        recorder.stop();
                        clearInterval(progressInterval);
                    };

                    // 5. Start Recording
                    recorder.start(1000);
                    
                    try {
                        await imageObj.play();
                    } catch (err) {
                        console.error("Playback failed", err);
                        setIsRecording(false);
                        recorder.stop();
                    }
                }
            };

            return (
                <div className="min-h-screen p-3 sm:p-4 lg:p-8 max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* Control Panel */}
                    <div className="w-full lg:w-1/3 xl:w-1/4 bg-gray-800 p-5 lg:p-6 rounded-xl shadow-2xl border border-gray-700 h-fit lg:max-h-[95vh] lg:overflow-y-auto">
                        <h1 className="text-2xl font-bold mb-6 text-blue-400">Photo & Video Watermark</h1>
                        
                        {mediaType === 'video' && (
                            <div className="mb-6 p-3 bg-blue-900/30 border border-blue-700 rounded-lg">
                                <p className="text-xs text-blue-200 leading-relaxed">
                                    <span className="font-bold">Experimental Video Mode:</span> Videos are processed locally in your browser. Exported files will be saved as <b>.mp4</b> (if supported by your browser) or <b>.webm</b>. Very high-resolution files (like 4K) may drop frames depending on your computer's speed.
                                </p>
                            </div>
                        )}

                        <div className="space-y-6">
                            {/* SECTION 1 */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">1. Media & Format</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Main Photo or Video</label>
                                        <input 
                                            type="file" 
                                            accept="image/*,video/*" 
                                            onChange={handleMediaUpload}
                                            className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Export Size</label>
                                        <select 
                                            value={outputSize} 
                                            onChange={(e) => setOutputSize(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="ig">Instagram 4:5 (Original Res)</option>
                                            <option value="original">Original Image Size</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Logo Position</label>
                                        <select 
                                            value={logoPosition} 
                                            onChange={(e) => setLogoPosition(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="top-right">Top Right</option>
                                            <option value="top-left">Top Left</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Typography Font</label>
                                        <select 
                                            value={fontFamily} 
                                            onChange={(e) => setFontFamily(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="'Noto Sans TC', sans-serif">Noto Sans (Modern)</option>
                                            <option value="'Noto Serif TC', serif">Noto Serif (Classic)</option>
                                            <option value="'Montserrat', sans-serif">Montserrat (Clean)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">
                                            Font Size ({Math.round(fontScale * 100)}%)
                                        </label>
                                        <input 
                                            type="range" 
                                            min="0.5" 
                                            max="1.5" 
                                            step="0.05"
                                            value={fontScale} 
                                            onChange={(e) => setFontScale(parseFloat(e.target.value))}
                                            className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                        />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            {/* SECTION 2 */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">2. Content Details</h2>
                                <div className="space-y-3">
                                    <div className="flex gap-2">
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Camera (相機)</label>
                                            <input 
                                                type="text" 
                                                value={camera} 
                                                onChange={(e) => setCamera(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Lens (鏡頭)</label>
                                            <input 
                                                type="text" 
                                                value={lens} 
                                                onChange={(e) => setLens(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Venue / Event</label>
                                            <input 
                                                type="text" 
                                                value={venue} 
                                                onChange={(e) => setVenue(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Seating / Row</label>
                                            <input 
                                                type="text" 
                                                value={seating} 
                                                onChange={(e) => setSeating(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Additional Text (Optional)</label>
                                        <input 
                                            type="text" 
                                            value={optionalText} 
                                            onChange={(e) => setOptionalText(e.target.value)}
                                            placeholder="Leave blank to hide..."
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            {/* SECTION 3: Seating Plan */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">3. Seating Plan (Optional)</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Upload Seating Plan</label>
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleSeatingPlanUpload}
                                            className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition cursor-pointer"
                                        />
                                    </div>
                                    {seatingPlanSrc && (
                                        <div className="bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                                            <label className="block text-xs font-semibold text-gray-300 mb-2">
                                                Tap / Click to drop a pin on the seat
                                            </label>
                                            <div className="relative inline-block border border-gray-600 bg-black rounded overflow-hidden">
                                                <img 
                                                    src={seatingPlanSrc} 
                                                    alt="Seating Plan" 
                                                    className="max-h-48 max-w-full cursor-crosshair object-contain" 
                                                    onClick={handleSeatingPlanClick}
                                                />
                                                {pinPosition && (
                                                    <svg 
                                                        className="absolute w-8 h-8 text-red-500 pointer-events-none"
                                                        style={{
                                                            left: `${pinPosition.x * 100}%`,
                                                            top: `${pinPosition.y * 100}%`,
                                                            transform: 'translate(-50%, -92%)',
                                                            filter: 'drop-shadow(0px 2px 3px rgba(0,0,0,0.6))'
                                                        }}
                                                        viewBox="0 0 24 24" 
                                                        fill="currentColor" 
                                                        xmlns="http://www.w3.org/2000/svg"
                                                    >
                                                        <path stroke="white" strokeWidth="1.5" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                                    </svg>
                                                )}
                                            </div>
                                            <button 
                                                onClick={clearSeatingPlan} 
                                                className="text-xs text-red-400 mt-3 block w-full hover:text-red-300 transition"
                                            >
                                                Remove Seating Plan
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            {/* SECTION 4: Sharpness Zoom */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">4. Sharpness Zoom (Optional)</h2>
                                <div className="space-y-4">
                                    <label className="flex items-center space-x-3 cursor-pointer">
                                        <input 
                                            type="checkbox" 
                                            checked={enableZoom} 
                                            onChange={(e) => setEnableZoom(e.target.checked)} 
                                            className="w-5 h-5 accent-blue-500 rounded bg-gray-900 border-gray-600 focus:ring-blue-500 focus:ring-2"
                                        />
                                        <span className="text-sm font-medium text-gray-300">Enable Sharpness Zoom</span>
                                    </label>

                                    {enableZoom && imageSrc && (
                                        <div className="bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                                            <label className="block text-xs font-semibold text-gray-300 mb-2">
                                                Tap / Click on the image to select zoom area
                                            </label>
                                            <div className="relative inline-block border border-gray-600 bg-black rounded overflow-hidden">
                                                {mediaType === 'image' ? (
                                                    <img 
                                                        src={imageSrc} 
                                                        alt="Main Thumbnail" 
                                                        className="max-h-48 max-w-full cursor-crosshair object-contain" 
                                                        onClick={handleMainImageClick}
                                                    />
                                                ) : (
                                                    <video 
                                                        src={imageSrc} 
                                                        className="max-h-48 max-w-full cursor-crosshair object-contain" 
                                                        onClick={handleMainImageClick}
                                                    />
                                                )}
                                            </div>
                                            <div className="mt-4 text-left space-y-3">
                                                <div>
                                                    <label className="block text-xs text-gray-400 mb-1">Zoom Position</label>
                                                    <select 
                                                        value={zoomPosition} 
                                                        onChange={(e) => setZoomPosition(e.target.value)}
                                                        className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                                    >
                                                        <option value="top-left">Top Left</option>
                                                        <option value="top-right">Top Right</option>
                                                        <option value="bottom-left">Bottom Left</option>
                                                        <option value="bottom-right">Bottom Right</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs text-gray-400 mb-1">Zoom Level ({zoomLevel}x)</label>
                                                    <input 
                                                        type="range" 
                                                        min="2" max="5" step="0.1" 
                                                        value={zoomLevel} 
                                                        onChange={(e) => setZoomLevel(parseFloat(e.target.value))} 
                                                        className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500" 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-xs text-gray-400 mb-1">Thumbnail Size ({Math.round(zoomSize * 100)}%)</label>
                                                    <input 
                                                        type="range" 
                                                        min="0.1" max="0.5" step="0.05" 
                                                        value={zoomSize} 
                                                        onChange={(e) => setZoomSize(parseFloat(e.target.value))} 
                                                        className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500" 
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button 
                                onClick={downloadMedia}
                                disabled={!imageObj || isRecording}
                                className={`w-full py-4 mt-4 rounded-md font-bold text-lg transition shadow-lg flex justify-center items-center ${imageObj && !isRecording ? 'bg-green-600 hover:bg-green-500 text-white cursor-pointer' : 'bg-gray-700 text-gray-400 cursor-not-allowed'}`}
                            >
                                {isRecording ? (
                                    <span>Recording... {recordingProgress}%</span>
                                ) : (
                                    <span>Export {mediaType === 'video' ? 'Video' : 'Image'}</span>
                                )}
                            </button>
                        </div>
                    </div>

                    {/* Preview Panel */}
                    <div className="w-full lg:w-2/3 xl:w-3/4 flex flex-col items-center">
                        <div className="w-full text-center mb-2 text-gray-400 flex items-center justify-center gap-2">
                            <span>Live Preview</span>
                            {mediaType === 'video' && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold animate-pulse">Video Active</span>}
                        </div>
                        
                        {/* Canvas Container */}
                        <div className="canvas-container w-full rounded-xl overflow-hidden shadow-2xl flex items-center justify-center min-h-[350px] lg:min-h-[500px] border border-gray-700 relative">
                            {!imageObj && (
                                <p className="text-gray-500 italic absolute px-4 text-center">Upload an image or video to see the preview</p>
                            )}
                            <canvas 
                                ref={canvasRef} 
                                className="max-w-full max-h-[60vh] lg:max-h-[85vh] object-contain shadow-2xl"
                                style={{ display: imageObj ? 'block' : 'none' }}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
