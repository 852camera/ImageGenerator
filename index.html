<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Watermark Studio</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts for Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: sans-serif; background-color: #111827; color: white; }
        .canvas-container {
            background: #1f2937;
            background-image: linear-gradient(45deg, #374151 25%, transparent 25%), 
                              linear-gradient(-45deg, #374151 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #374151 75%), 
                              linear-gradient(-45deg, transparent 75%, #374151 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // Image states
            const [imageObj, setImageObj] = useState(null);
            const [logoObj, setLogoObj] = useState(null);
            const [seatingPlanObj, setSeatingPlanObj] = useState(null);
            const [seatingPlanSrc, setSeatingPlanSrc] = useState(null);
            
            // Interaction states
            const [pinPosition, setPinPosition] = useState(null);
            
            // UI states
            const [outputSize, setOutputSize] = useState('ig');
            const [fontFamily, setFontFamily] = useState("'Noto Sans TC', sans-serif");
            const [fontScale, setFontScale] = useState(1);
            const [logoPosition, setLogoPosition] = useState('top-right');

            // Text content states
            const [camera, setCamera] = useState('Canon R7');
            const [lens, setLens] = useState('RF100500');
            const [venue, setVenue] = useState('Kai Tak Arena');
            const [seating, setSeating] = useState('Block A Row C');
            const [optionalText, setOptionalText] = useState('');

            const canvasRef = useRef(null);

            // Load hardcoded logo on initial render
            useEffect(() => {
                const img = new Image();
                img.onload = () => setLogoObj(img);
                // Ensure your logo image is named 'logo.png' and placed in the same folder
                img.src = 'logo.jpg'; 
            }, []);

            // Handle main image upload
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => setImageObj(img);
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Handle seating plan upload
            const handleSeatingPlanUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setSeatingPlanSrc(event.target.result);
                        const img = new Image();
                        img.onload = () => setSeatingPlanObj(img);
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Handle pin dropping on the seating plan
            const handleSeatingPlanClick = (e) => {
                const rect = e.target.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                setPinPosition({ x, y });
            };

            const clearSeatingPlan = () => {
                setSeatingPlanObj(null);
                setSeatingPlanSrc(null);
                setPinPosition(null);
            };

            // Redraw canvas whenever inputs or image changes
            useEffect(() => {
                if (!imageObj || !canvasRef.current) return;

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                let w, h;
                let imgX = 0, imgY = 0, imgW, imgH;

                // 1. Determine Canvas Size
                if (outputSize === 'ig') {
                    canvas.width = 1080;
                    canvas.height = 1350;
                    w = 1080;
                    h = 1350;
                } else {
                    canvas.width = imageObj.width;
                    canvas.height = imageObj.height;
                    w = canvas.width;
                    h = canvas.height;
                }

                // Default image bounds to full canvas
                imgW = w;
                imgH = h;

                // Clear canvas before drawing
                ctx.clearRect(0, 0, w, h);

                // 2. Draw Image (with or without border)
                if (outputSize === 'ig') {
                    // --- Draw White Background Border ---
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, w, h);

                    // --- Draw Fitted Image in center ---
                    const scaleFit = Math.min(w / imageObj.width, h / imageObj.height);
                    imgW = imageObj.width * scaleFit;
                    imgH = imageObj.height * scaleFit;
                    imgX = (w - imgW) / 2;
                    imgY = (h - imgH) / 2;
                    
                    // Add clean subtle shadow against the white background
                    ctx.shadowColor = 'rgba(0,0,0,0.15)';
                    ctx.shadowBlur = 30;
                    ctx.drawImage(imageObj, imgX, imgY, imgW, imgH);
                    
                    // Reset shadow
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                } else {
                    // Original layout: just draw image filling the canvas
                    ctx.drawImage(imageObj, 0, 0, w, h);
                }

                // 3. Setup Text Scaling & Dimensions
                const textMarginX = imgW * 0.025; // Tight left spacing
                
                // Scaled Font Sizes
                const primaryFontSize = imgW * 0.036 * fontScale;
                const secondaryFontSize = imgW * 0.028 * fontScale;

                // Calculate dynamic bar height based on text
                const lineSpacing = imgW * 0.01 * fontScale;
                const totalTextHeight = primaryFontSize + secondaryFontSize + (optionalText ? secondaryFontSize + lineSpacing : 0) + lineSpacing;
                const paddingY = imgW * 0.02 * fontScale; // Tighter vertical padding
                
                const barHeight = totalTextHeight + paddingY * 2;
                const barY = imgY + imgH - barHeight;

                // 4. Draw Bottom Overlay Bar (Smooth Gradient)
                // Stretch gradient across the full width, keeping it obvious at 75%
                const barGrad = ctx.createLinearGradient(imgX, barY, imgX + imgW, barY);
                barGrad.addColorStop(0, '#0F305D'); 
                barGrad.addColorStop(0.6, 'rgba(15, 48, 93, 0.9)');  // Hold strong blue past the middle
                barGrad.addColorStop(0.75, 'rgba(15, 48, 93, 0.6)'); // Still very visible at 75%
                barGrad.addColorStop(0.95, 'rgba(15, 48, 93, 0)');   // Fade out completely near the right edge
                
                ctx.fillStyle = barGrad;
                ctx.fillRect(imgX, barY, imgW, barHeight);

                // 5. Draw Text Elements
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = imgW * 0.005;
                ctx.shadowOffsetX = imgW * 0.001;
                ctx.shadowOffsetY = imgW * 0.001;

                // --- Bottom Left: Equipment, Location & Optional Text ---
                ctx.textAlign = 'left';
                let currentY = barY + paddingY + primaryFontSize * 0.85; // Start near the top of the bar
                
                // Line 1: Equipment
                ctx.font = `900 ${primaryFontSize}px ${fontFamily}`; // Extra bold
                ctx.fillStyle = 'white';

                let equipmentText = '拍攝器材 : ';
                if (camera && lens) {
                    equipmentText += `${camera} + ${lens}`;
                } else if (camera || lens) {
                    equipmentText += camera || lens;
                }
                
                ctx.fillText(equipmentText, imgX + textMarginX, currentY);

                // Line 2: Location
                currentY += secondaryFontSize + lineSpacing;
                ctx.font = `400 ${secondaryFontSize}px ${fontFamily}`; // Regular weight
                const locationDisplay = [venue, seating].filter(Boolean).join(' | ');
                ctx.fillText(locationDisplay, imgX + textMarginX, currentY);

                // Line 3: Optional Text
                if (optionalText) {
                    currentY += secondaryFontSize + lineSpacing;
                    ctx.fillText(optionalText, imgX + textMarginX, currentY);
                }

                // Reset shadow before drawing images
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                // 6. Draw Top Brand Logo
                if (logoObj) {
                    // Set max bounds for the logo relative to the image size
                    const logoMaxW = imgW * 0.25; // Max width is 25% of image width
                    const logoMaxH = imgW * 0.08; // Max height is 8% of image width
                    
                    let logoW = logoObj.width;
                    let logoH = logoObj.height;
                    
                    // Scale logo proportionally to fit within max bounds
                    const scale = Math.min(logoMaxW / logoW, logoMaxH / logoH);
                    logoW = logoW * scale;
                    logoH = logoH * scale;

                    // Position based on user selection
                    const logoX = logoPosition === 'top-left' 
                        ? imgX + textMarginX 
                        : imgX + imgW - logoW - textMarginX;
                    const logoY = imgY + imgW * 0.03; // Padding from top edge

                    // Optional subtle shadow for logo visibility
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = imgW * 0.01;
                    
                    ctx.drawImage(logoObj, logoX, logoY, logoW, logoH);
                    
                    // Reset shadow
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                // 7. Draw Seating Plan (Bottom Right)
                if (seatingPlanObj) {
                    const spMaxW = imgW * 0.25; // Max width is 25% of image width
                    const spMaxH = imgH * 0.20; // Max height is 20% of image height
                    
                    let spW = seatingPlanObj.width;
                    let spH = seatingPlanObj.height;
                    
                    // Scale proportionally
                    const spScale = Math.min(spMaxW / spW, spMaxH / spH);
                    spW = spW * spScale;
                    spH = spH * spScale;

                    // Position in bottom right, aligned with text padding
                    const spX = imgX + imgW - spW - textMarginX;
                    const spY = imgY + imgH - spH - paddingY; 

                    // Draw image with a clean border
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = imgW * 0.008;
                    ctx.lineWidth = imgW * 0.002;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)'; // White border
                    
                    ctx.drawImage(seatingPlanObj, spX, spY, spW, spH);
                    ctx.strokeRect(spX, spY, spW, spH);
                    
                    // Draw Interactive Map Pin
                    if (pinPosition) {
                        const pinX = spX + (pinPosition.x * spW);
                        const pinY = spY + (pinPosition.y * spH);
                        
                        ctx.save();
                        ctx.translate(pinX, pinY);
                        
                        // Add drop shadow for the pin to make it pop on any background
                        ctx.shadowColor = 'rgba(0,0,0,0.6)';
                        ctx.shadowBlur = imgW * 0.005;
                        ctx.shadowOffsetY = imgW * 0.002;
                        
                        // Size of the pin relative to the image
                        const pinScale = imgW * 0.0018; 
                        ctx.scale(pinScale, pinScale);
                        
                        // Center the tip of the pin at (0,0) - SVG path has tip at approx (12, 22)
                        ctx.translate(-12, -22); 
                        
                        // Standard map marker path
                        const pinPath = new Path2D("M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z");
                        
                        // Draw white outline
                        ctx.lineWidth = 1.5 / pinScale; // Keeps the stroke width visually consistent
                        ctx.strokeStyle = '#ffffff';
                        ctx.stroke(pinPath);
                        
                        // Fill with bright red
                        ctx.fillStyle = '#ef4444'; 
                        ctx.fill(pinPath);
                        
                        ctx.restore();
                    }
                    
                    // Reset shadows
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

            }, [imageObj, logoObj, seatingPlanObj, pinPosition, camera, lens, venue, seating, optionalText, outputSize, fontFamily, fontScale, logoPosition]);

            const downloadImage = () => {
                if (!canvasRef.current) return;
                const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                link.download = 'watermarked_photo.jpg';
                link.href = dataUrl;
                link.click();
            };

            return (
                <div className="min-h-screen p-3 sm:p-4 lg:p-8 max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* Control Panel */}
                    <div className="w-full lg:w-1/3 xl:w-1/4 bg-gray-800 p-5 lg:p-6 rounded-xl shadow-2xl border border-gray-700 h-fit lg:max-h-[95vh] lg:overflow-y-auto">
                        <h1 className="text-2xl font-bold mb-6 text-blue-400">Photo Watermark Tool</h1>
                        
                        <div className="space-y-6">
                            {/* SECTION 1 */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">1. Images & Format</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Main Photo</label>
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleImageUpload}
                                            className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Export Size</label>
                                        <select 
                                            value={outputSize} 
                                            onChange={(e) => setOutputSize(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="ig">Instagram Portrait (1080x1350)</option>
                                            <option value="original">Original Image Size</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Logo Position</label>
                                        <select 
                                            value={logoPosition} 
                                            onChange={(e) => setLogoPosition(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="top-right">Top Right</option>
                                            <option value="top-left">Top Left</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Typography Font</label>
                                        <select 
                                            value={fontFamily} 
                                            onChange={(e) => setFontFamily(e.target.value)}
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        >
                                            <option value="'Noto Sans TC', sans-serif">Noto Sans (Modern)</option>
                                            <option value="'Noto Serif TC', serif">Noto Serif (Classic)</option>
                                            <option value="'Montserrat', sans-serif">Montserrat (Clean)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">
                                            Font Size ({Math.round(fontScale * 100)}%)
                                        </label>
                                        <input 
                                            type="range" 
                                            min="0.5" 
                                            max="1.5" 
                                            step="0.05"
                                            value={fontScale} 
                                            onChange={(e) => setFontScale(parseFloat(e.target.value))}
                                            className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                        />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            {/* SECTION 2 */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">2. Content Details</h2>
                                <div className="space-y-3">
                                    <div className="flex gap-2">
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Camera (相機)</label>
                                            <input 
                                                type="text" 
                                                value={camera} 
                                                onChange={(e) => setCamera(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Lens (鏡頭)</label>
                                            <input 
                                                type="text" 
                                                value={lens} 
                                                onChange={(e) => setLens(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Venue / Event</label>
                                            <input 
                                                type="text" 
                                                value={venue} 
                                                onChange={(e) => setVenue(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-xs text-gray-400 mb-1">Seating / Row</label>
                                            <input 
                                                type="text" 
                                                value={seating} 
                                                onChange={(e) => setSeating(e.target.value)}
                                                className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-400 mb-1">Additional Text (Optional)</label>
                                        <input 
                                            type="text" 
                                            value={optionalText} 
                                            onChange={(e) => setOptionalText(e.target.value)}
                                            placeholder="Leave blank to hide..."
                                            className="w-full bg-gray-900 border border-gray-600 rounded-md px-3 py-1.5 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                        />
                                    </div>
                                </div>
                            </div>

                            <hr className="border-gray-700" />

                            {/* SECTION 3: Seating Plan */}
                            <div>
                                <h2 className="text-lg font-semibold text-white mb-3">3. Seating Plan (Optional)</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-400 mb-1">Upload Seating Plan</label>
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleSeatingPlanUpload}
                                            className="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition cursor-pointer"
                                        />
                                    </div>
                                    {seatingPlanSrc && (
                                        <div className="bg-gray-900 p-3 rounded-lg border border-gray-700 text-center">
                                            <label className="block text-xs font-semibold text-gray-300 mb-2">
                                                Tap / Click to drop a pin on the seat
                                            </label>
                                            <div className="relative inline-block border border-gray-600 bg-black rounded overflow-hidden">
                                                <img 
                                                    src={seatingPlanSrc} 
                                                    alt="Seating Plan" 
                                                    className="max-h-48 max-w-full cursor-crosshair object-contain" 
                                                    onClick={handleSeatingPlanClick}
                                                />
                                                {pinPosition && (
                                                    <svg 
                                                        className="absolute w-8 h-8 text-red-500 pointer-events-none"
                                                        style={{
                                                            left: `${pinPosition.x * 100}%`,
                                                            top: `${pinPosition.y * 100}%`,
                                                            transform: 'translate(-50%, -92%)',
                                                            filter: 'drop-shadow(0px 2px 3px rgba(0,0,0,0.6))'
                                                        }}
                                                        viewBox="0 0 24 24" 
                                                        fill="currentColor" 
                                                        xmlns="http://www.w3.org/2000/svg"
                                                    >
                                                        <path stroke="white" strokeWidth="1.5" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                                    </svg>
                                                )}
                                            </div>
                                            <button 
                                                onClick={clearSeatingPlan} 
                                                className="text-xs text-red-400 mt-3 block w-full hover:text-red-300 transition"
                                            >
                                                Remove Seating Plan
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button 
                                onClick={downloadImage}
                                disabled={!imageObj}
                                className={`w-full py-3 mt-4 rounded-md font-bold text-lg transition ${imageObj ? 'bg-green-600 hover:bg-green-500 text-white cursor-pointer shadow-lg' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}
                            >
                                Export & Download
                            </button>
                        </div>
                    </div>

                    {/* Preview Panel */}
                    <div className="w-full lg:w-2/3 xl:w-3/4 flex flex-col items-center">
                        <div className="w-full text-center mb-2 text-gray-400">
                            Live Preview 
                        </div>
                        
                        {/* Canvas Container */}
                        <div className="canvas-container w-full rounded-xl overflow-hidden shadow-2xl flex items-center justify-center min-h-[350px] lg:min-h-[500px] border border-gray-700 relative">
                            {!imageObj && (
                                <p className="text-gray-500 italic absolute px-4 text-center">Upload an image to see the preview</p>
                            )}
                            <canvas 
                                ref={canvasRef} 
                                className="max-w-full max-h-[60vh] lg:max-h-[85vh] object-contain shadow-2xl"
                                style={{ display: imageObj ? 'block' : 'none' }}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
